# swisseph-rs architectural constraints
# Seeded from PRD (yojana:swisseph-rs) — 2026-06-24

# =============================================================================
# Backend isolation — moshier, jpl, sweph_file are independent backends.
# None may import from another. The calc dispatcher is the integration point.
#
# Globs re-pointed 2026-06-29 (checkpoint:swisseph-rs/8): sweph_file became a
# directory module (the old "src/sweph_file.rs" globs had gone silently inert —
# dead_constraint). jpl is converting to a directory in swisseph-rs/43; the
# "src/jpl/**" globs are pre-pointed to that target and are intentionally inert
# until 43 lands — the current src/jpl.rs is an empty stub with no imports, so
# nothing is unguarded in the interim. (globset rejects a combined
# "src/jpl{.rs,/**}" brace: recursive wildcards must be a lone path component.)
# =============================================================================

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:moshier→jpl"
from = "src/moshier/**"
to = "src/jpl/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:moshier→sweph"
from = "src/moshier/**"
to = "src/sweph_file/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:jpl→moshier"
from = "src/jpl/**"
to = "src/moshier/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:jpl→sweph"
from = "src/jpl/**"
to = "src/sweph_file/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:sweph→moshier"
from = "src/sweph_file/**"
to = "src/moshier/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:sweph→jpl"
from = "src/sweph_file/**"
to = "src/jpl/**"
severity = "blocking"
provenance = "yojana:swisseph-rs §module-tree"

# =============================================================================
# Checkpoint 2026-06-29 (checkpoint:swisseph-rs/8) — fired triggers
# =============================================================================

# FIRED: cross-module imports have existed since Phase 1 (date.rs); bound at the
# JPL-planning checkpoint (overdue by six phases). Guards use-based import cycles
# in src/. NB: sutra's import graph captures `use`-based edges only, so the
# pre-existing context<->deltat coupling via crate::-qualified calls is not seen
# here and is out of scope for this constraint.
[[constraint]]
kind = "no_cycles"
name = "no-module-cycles"
scope = "src/"
severity = "blocking"
provenance = "checkpoint:swisseph-rs/8"

