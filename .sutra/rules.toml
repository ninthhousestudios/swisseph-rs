kind = "forbidden_dep"
name = "backend-isolation:jplâ†’moshier"
from = "src/jpl/**"
to = "src/moshier/**"
severity = "blocking"
provenance = "yojana:swisseph-rs Â§module-tree"

[[constraint]]
