# swisseph-rs architectural constraints
# Seeded from PRD (yojana:swisseph-rs) â€” 2026-06-24

# =============================================================================
# Backend isolation â€” moshier, jpl, sweph_file are independent backends.
# None may import from another. The calc dispatcher is the integration point.
#
# Globs re-pointed 2026-06-29 (checkpoint:swisseph-rs/8): sweph_file became a
# directory module (the old "src/sweph_file.rs" globs had gone silently inert â€”
# dead_constraint). jpl is converting to a directory in swisseph-rs/43; the
# "src/jpl/**" globs are pre-pointed to that target and are intentionally inert
# until 43 lands â€” the current src/jpl.rs is an empty stub with no imports, so
# nothing is unguarded in the interim. (globset rejects a combined
# "src/jpl{.rs,/**}" brace: recursive wildcards must be a lone path component.)
# =============================================================================

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:moshierâ†’jpl"
from = "src/moshier/**"
to = "src/jpl/**"
severity = "blocking"
provenance = "yojana:swisseph-rs Â§module-tree"

[[constraint]]
kind = "forbidden_dep"
name = "backend-isolation:moshierâ†’sweph"
from = "src/moshier/**"
to = "src/sweph_file/**"
